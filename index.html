<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flashcard App</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    text-align: center;
}

.container {
    width: 400px;
    margin: 50px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card {
    border: 1px solid #ddd;
    padding: 30px;
    border-radius: 8px;
    margin-bottom: 15px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    background: #007bff;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

input {
    width: 90%;
    padding: 8px;
    margin: 5px 0;
}
</style>

</head>
<body>

<div class="container">
    <h2>Flashcard Quiz App</h2>

    <div class="card">
        <p><b>Question:</b> What is HTML?</p>
        <p><b>Answer:</b> HyperText Markup Language</p>
    </div>

    <button>Show Answer</button><br>

    <button>Previous</button>
    <button>Next</button>

    <hr>

    <h3>Add Flashcard</h3>
    <input type="text" placeholder="Enter Question"><br>
    <input type="text" placeholder="Enter Answer"><br>

    <button>Add</button>
    <button>Edit</button>
    <button>Delete</button>

</div>

</body>
</html>
